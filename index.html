<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>つきまちカラオケ大会 BEST3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #1a0505;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .form-title {
    color: #f5c842;
    font-size: 20px;
    font-weight: 900;
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: 2px;
    text-shadow: 0 0 12px #f5c842;
  }

  .form-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
  }

  .rank-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .rank-label { font-size: 24px; font-weight: 900; width: 44px; flex-shrink: 0; text-align: center; }
  .rank-1 { color: #f5c842; text-shadow: 0 0 10px #f5c842; }
  .rank-2 { color: #c0c0c0; text-shadow: 0 0 8px #c0c0c0; }
  .rank-3 { color: #cd7f32; text-shadow: 0 0 8px #cd7f32; }

  .rank-row input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 15px;
    color: #fff;
    font-family: inherit;
  }
  .rank-row input::placeholder { color: rgba(255,255,255,0.3); }
  .rank-row input:focus { outline: none; border-color: #f5c842; }

  .btn-preview {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    background: linear-gradient(135deg, #c8a600, #f5c842);
    color: #1a0505;
    font-size: 16px;
    font-weight: 900;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: opacity 0.15s;
  }
  .btn-preview:hover { opacity: 0.85; }

  /* フルスクリーンプレビュー */
  .preview-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #1a0505;
  }
  .preview-overlay.show { display: block; }

  .preview-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #8b0000 0%, #3d0000 40%, #1a0505 70%);
  }

  .curtain-left, .curtain-right {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 10%;
    z-index: 1;
    pointer-events: none;
  }
  .curtain-left { left: 0; background: linear-gradient(to right, #8b0000, transparent); }
  .curtain-right { right: 0; background: linear-gradient(to left, #8b0000, transparent); }

  .sparkles { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .sparkle {
    position: absolute;
    border-radius: 50%;
    background: #f5c842;
    animation: twinkle 2s infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .preview-close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1001;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* コンテンツ全体 */
  .preview-content {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3vh 10% 4vh;
  }

  /* タイトル */
  .preview-title-sub {
    font-size: clamp(24px, 5vw, 68px);
    color: #fff;
    letter-spacing: 4px;
    font-weight: 700;
    background: rgba(255,255,255,0.15);
    padding: 4px 20px;
    border-radius: 20px;
    margin-bottom: 1vh;
    border: 1px solid rgba(255,255,255,0.3);
    white-space: nowrap;
  }

  .preview-title-main {
    font-size: clamp(40px, 9vw, 110px);
    font-weight: 900;
    letter-spacing: 4px;
    margin-bottom: 2vh;
    background: linear-gradient(180deg, #fff700 0%, #f5c842 40%, #c8860a 70%, #f5c842 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(245,200,66,0.8));
    line-height: 1;
  }

  /* ランキング */
  .rank-items {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
  }

  .rank-item {
    display: flex;
    align-items: center;
    height: 28%;
    gap: 1.5%;
  }

  .rank-num {
    width: 9%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .rank-num .num {
    font-size: clamp(36px, 7vw, 90px);
    font-weight: 900;
    line-height: 1;
  }
  .rank-num .i {
    font-size: clamp(10px, 1.5vw, 18px);
    font-weight: 700;
  }

  .rank-item:nth-child(1) .num,
  .rank-item:nth-child(1) .i {
    background: linear-gradient(180deg, #fff700, #f5c842, #c8860a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 6px rgba(245,200,66,0.9));
  }
  .rank-item:nth-child(2) .num,
  .rank-item:nth-child(2) .i { color: #c0c0c0; text-shadow: 0 0 6px #c0c0c0; }
  .rank-item:nth-child(3) .num,
  .rank-item:nth-child(3) .i { color: #cd7f32; text-shadow: 0 0 6px #cd7f32; }

  .name-box {
    flex: 1;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 4%;
    border-radius: 6px;
    overflow: hidden;
  }
  .rank-item:nth-child(1) .name-box {
    background: linear-gradient(135deg, #b8960a, #f5e070, #c8a600);
    box-shadow: 0 0 20px rgba(245,200,66,0.3);
  }
  .rank-item:nth-child(2) .name-box { background: #fff; }
  .rank-item:nth-child(3) .name-box { background: #fff; }

  .name-text {
    font-size: clamp(30px, 7vw, 70px);
    font-weight: 900;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rank-item:nth-child(1) .name-text { color: #3d2200; }
  .rank-item:nth-child(2) .name-text { color: #111; }
  .rank-item:nth-child(3) .name-text { color: #111; }

  .score-box {
    width: 26%;
    height: 100%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #050505;
    border-radius: 6px;
    border: 1px solid #1a1a1a;
  }

  .score-text {
    font-size: clamp(28px, 6.5vw, 85px);
    font-weight: 900;
    font-family: 'Courier New', monospace;
    opacity: 0;
    transition: opacity 0.2s;
    color: #fff;
    text-shadow:
      0 0 7px #fff,
      0 0 10px #0fa,
      0 0 21px #0fa,
      0 0 42px #0fa,
      0 0 82px #0fa;
    white-space: nowrap;
  }
</style>
</head>
<body>

<p class="form-title">🎤 BEST3 入力フォーム</p>

<div class="form-card">
  <div class="rank-row">
    <span class="rank-label rank-1">🥇</span>
    <input type="text" id="name1" placeholder="1位 名前">
    <input type="text" id="score1" placeholder="点数" style="max-width:110px;">
  </div>
  <div class="rank-row">
    <span class="rank-label rank-2">🥈</span>
    <input type="text" id="name2" placeholder="2位 名前">
    <input type="text" id="score2" placeholder="点数" style="max-width:110px;">
  </div>
  <div class="rank-row">
    <span class="rank-label rank-3">🥉</span>
    <input type="text" id="name3" placeholder="3位 名前">
    <input type="text" id="score3" placeholder="点数" style="max-width:110px;">
  </div>
  <button class="btn-preview" onclick="startPreview()">▶ プレビューを表示</button>
</div>

<div class="preview-overlay" id="previewOverlay">
  <div class="preview-bg"></div>
  <div class="curtain-left"></div>
  <div class="curtain-right"></div>
  <div class="sparkles" id="sparkles"></div>
  <button class="preview-close" onclick="closePreview()">×</button>

  <div class="preview-content">
    <div class="preview-title-sub">つきまちカラオケ大会</div>
    <div class="preview-title-main">BEST3</div>

    <div class="rank-items">
      <div class="rank-item">
        <div class="rank-num"><span class="num">1</span><span class="i">位</span></div>
        <div class="name-box"><span class="name-text" id="pName1"></span></div>
        <div class="score-box"><span class="score-text" id="pScore1"></span></div>
      </div>
      <div class="rank-item">
        <div class="rank-num"><span class="num">2</span><span class="i">位</span></div>
        <div class="name-box"><span class="name-text" id="pName2"></span></div>
        <div class="score-box"><span class="score-text" id="pScore2"></span></div>
      </div>
      <div class="rank-item">
        <div class="rank-num"><span class="num">3</span><span class="i">位</span></div>
        <div class="name-box"><span class="name-text" id="pName3"></span></div>
        <div class="score-box"><span class="score-text" id="pScore3"></span></div>
      </div>
    </div>
  </div>
</div>

<script>
  // localStorage
  window.addEventListener('load', () => {
    ['name1','name2','name3','score1','score2','score3'].forEach(id => {
      const saved = localStorage.getItem('karaoke_' + id);
      if (saved) document.getElementById(id).value = saved;
    });
  });
  ['name1','name2','name3','score1','score2','score3'].forEach(id => {
    document.getElementById(id).addEventListener('input', (e) => {
      localStorage.setItem('karaoke_' + id, e.target.value);
    });
  });

  // キラキラ
  function createSparkles() {
    const container = document.getElementById('sparkles');
    for (let i = 0; i < 30; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      const size = (2 + Math.random() * 4) + 'px';
      s.style.width = s.style.height = size;
      container.appendChild(s);
    }
  }
  createSparkles();

  function startPreview() {
    const data = [
      { name: document.getElementById('name1').value, score: document.getElementById('score1').value },
      { name: document.getElementById('name2').value, score: document.getElementById('score2').value },
      { name: document.getElementById('name3').value, score: document.getElementById('score3').value },
    ];

    if (!data[0].name && !data[0].score) {
      alert('1位の名前か点数を入力してください。');
      return;
    }

    for (let i = 1; i <= 3; i++) {
      document.getElementById('pName' + i).textContent = '';
      document.getElementById('pScore' + i).textContent = '';
      document.getElementById('pName' + i).style.opacity = '0';
      document.getElementById('pScore' + i).style.opacity = '0';
    }

    document.getElementById('previewOverlay').classList.add('show');new Audio('fanfare.mp3').play();

    [2, 1, 0].forEach((rankIndex, step) => {
      const rank = rankIndex + 1;
      setTimeout(() => {
        animateValue('pName' + rank, data[rankIndex].name, 900);
        animateValue('pScore' + rank, data[rankIndex].score, 900);
      }, step * 1400);
    });
  }

  function animateValue(elId, finalValue, duration) {
    const el = document.getElementById(elId);
    if (!finalValue) return;
    const isScore = elId.startsWith('pScore');
    const chars = isScore
      ? '0123456789'
      : 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん';
    let elapsed = 0;
    const interval = 40;
    el.style.opacity = '1';
    const timer = setInterval(() => {
      elapsed += interval;
      if (elapsed >= duration) {
        clearInterval(timer);
        el.textContent = isScore ? finalValue + '点' : finalValue;
      } else {
        let r = '';
        for (let i = 0; i < finalValue.length; i++) {
          r += chars[Math.floor(Math.random() * chars.length)];
        }
        el.textContent = isScore ? r + '点' : r;
      }
    }, interval);
  }

  function closePreview() {
    document.getElementById('previewOverlay').classList.remove('show');
  }
</script>
</body>
</html>
